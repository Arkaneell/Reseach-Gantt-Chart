<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Research Group — Gantt Chart (28 Mar – 1 May 2026)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f5;
    --surface: #f1f0eb;
    --border: rgba(0,0,0,0.1);
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #9c9a92;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242421;
      --border: rgba(255,255,255,0.1);
      --text-primary: #e8e6de;
      --text-secondary: #9c9a92;
      --text-tertiary: #5f5e5a;
    }
  }
  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 48px 24px;
  }
  .page { max-width: 900px; margin: 0 auto; }
  header {
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
  }
  header h1 { font-size: 22px; font-weight: 400; letter-spacing: -0.3px; }
  header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-family: 'Courier New', monospace;
  }
  .ruler {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
    padding-bottom: 4px;
  }
  .r-tick {
    flex: 1;
    font-size: 10px;
    color: var(--text-tertiary);
    text-align: center;
    border-left: 1px solid var(--border);
    padding-top: 2px;
    font-family: 'Courier New', monospace;
  }
  .phase-block { margin-bottom: 22px; }
  .ph-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .ph-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ph-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    font-family: 'Courier New', monospace;
  }
  .ph-range {
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: 'Courier New', monospace;
    margin-left: 2px;
  }
  .track {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .task-row {
    display: flex;
    align-items: center;
    height: 30px;
    border-bottom: 1px solid var(--border);
  }
  .task-row:last-child { border-bottom: none; }
  .task-label {
    font-size: 11px;
    color: var(--text-secondary);
    width: 230px;
    flex-shrink: 0;
    padding: 0 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Courier New', monospace;
    border-right: 1px solid var(--border);
  }
  .bar-area { flex: 1; position: relative; height: 100%; }
  .bar {
    position: absolute;
    top: 6px;
    height: 18px;
    border-radius: 4px;
    opacity: 0.88;
  }
  .m-section { margin-top: 14px; }
  .m-title {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 10px;
    font-family: 'Courier New', monospace;
  }
  .m-row { display: flex; align-items: center; margin-bottom: 6px; }
  .m-line { height: 1px; background: var(--border); flex-shrink: 0; }
  .m-diamond {
    width: 11px; height: 11px;
    border: 2px solid;
    transform: rotate(45deg);
    flex-shrink: 0;
    background: var(--bg);
  }
  .m-lbl {
    font-size: 11px;
    color: var(--text-secondary);
    margin-left: 8px;
    white-space: nowrap;
    font-family: 'Courier New', monospace;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); font-family: 'Courier New', monospace; }
  .leg-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  footer {
    margin-top: 48px;
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: 'Courier New', monospace;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>ML Research Group — Gantt Chart</h1>
    <p>28 Mar 2026 → 01 May 2026</p>
  </header>

  <div class="ruler" id="ruler"></div>
  <div id="gantt"></div>

  <div class="m-section">
    <div class="m-title">Key Milestones</div>
    <div id="milestones"></div>
  </div>

  <div class="legend" id="legend"></div>
  <footer>Generated · ML Research Group · 2026</footer>
</div>

<script>
const START = new Date('2026-03-28');
const END   = new Date('2026-05-01');
const DAYS  = (END - START) / 86400000;

function p(date){ return ((new Date(date) - START) / 86400000 / DAYS * 100).toFixed(3); }
function w(s, e){ return ((new Date(e) - new Date(s)) / 86400000 / DAYS * 100).toFixed(3); }

const PHASES = [
  {
    label: 'Phase 1 — Setup & scoping', color: '#534AB7', text: '#EDE9FB',
    start: '2026-03-28', end: '2026-04-03',
    tasks: [
      { label: 'Setting up basic libraries',         start: '2026-03-28', end: '2026-03-30' },
      { label: 'Clarify research problem',           start: '2026-03-29', end: '2026-04-01' },
      { label: 'Design overall model architecture',  start: '2026-03-31', end: '2026-04-02' },
      { label: 'Dataset collection & model init',    start: '2026-04-01', end: '2026-04-03' },
    ]
  },
  {
    label: 'Phase 2 — Training & tuning', color: '#0F6E56', text: '#D4EFE4',
    start: '2026-04-03', end: '2026-04-11',
    tasks: [
      { label: 'Analysis of the model',              start: '2026-04-03', end: '2026-04-05' },
      { label: 'Hyperparameter tuning',              start: '2026-04-05', end: '2026-04-08' },
      { label: 'Architecture updates & fixes',       start: '2026-04-07', end: '2026-04-10' },
      { label: 'Implement new ideas (if needed)',    start: '2026-04-09', end: '2026-04-11' },
    ]
  },
  {
    label: 'Phase 3 — Results & docs', color: '#185FA5', text: '#CEDEF6',
    start: '2026-04-11', end: '2026-04-23',
    tasks: [
      { label: 'Analysis of results',                start: '2026-04-11', end: '2026-04-16' },
      { label: 'Comparison with existing models',    start: '2026-04-15', end: '2026-04-20' },
      { label: 'System documentation',               start: '2026-04-19', end: '2026-04-23' },
    ]
  },
  {
    label: 'Phase 4 — Write-up & submission', color: '#854F0B', text: '#FAEEDA',
    start: '2026-04-23', end: '2026-05-01',
    tasks: [
      { label: 'Drafting',                           start: '2026-04-23', end: '2026-04-26' },
      { label: 'Editing',                            start: '2026-04-26', end: '2026-04-29' },
      { label: 'Packaging for submission',           start: '2026-04-29', end: '2026-05-01' },
    ]
  }
];

const MILESTONES = [
  { label: 'Kickoff',          date: '2026-03-28', color: '#534AB7' },
  { label: 'Training begins',  date: '2026-04-03', color: '#0F6E56' },
  { label: 'Experiments done', date: '2026-04-23', color: '#185FA5' },
  { label: 'Submission',       date: '2026-05-01', color: '#854F0B' },
];

// Ruler
const ruler = document.getElementById('ruler');
let d = new Date(START);
while (d <= END) {
  const t = document.createElement('div');
  t.className = 'r-tick';
  t.textContent = (d.getMonth()+1) + '/' + (d.getDate() < 10 ? '0' : '') + d.getDate();
  ruler.appendChild(t);
  d = new Date(d); d.setDate(d.getDate() + 7);
}

// Phases & tasks
const gantt = document.getElementById('gantt');
PHASES.forEach(ph => {
  const block = document.createElement('div');
  block.className = 'phase-block';
  block.innerHTML = `
    <div class="ph-header">
      <div class="ph-dot" style="background:${ph.color}"></div>
      <span class="ph-name">${ph.label}</span>
      <span class="ph-range">${ph.start.slice(5)} → ${ph.end.slice(5)}</span>
    </div>`;
  const track = document.createElement('div');
  track.className = 'track';
  ph.tasks.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row';
    const lbl = document.createElement('div');
    lbl.className = 'task-label';
    lbl.textContent = t.label;
    lbl.title = t.label;
    const area = document.createElement('div');
    area.className = 'bar-area';
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.cssText = `left:${p(t.start)}%;width:${w(t.start, t.end)}%;background:${ph.color}`;
    area.appendChild(bar);
    row.appendChild(lbl);
    row.appendChild(area);
    track.appendChild(row);
  });
  block.appendChild(track);
  gantt.appendChild(block);
});

// Milestones
const mc = document.getElementById('milestones');
MILESTONES.forEach(m => {
  const pctVal = parseFloat(p(m.date));
  const row = document.createElement('div');
  row.className = 'm-row';
  row.innerHTML = `
    <div class="m-line" style="width:${pctVal}%;min-width:0"></div>
    <div class="m-diamond" style="border-color:${m.color}"></div>
    <span class="m-lbl">${m.label} · ${m.date.slice(5)}</span>`;
  mc.appendChild(row);
});

// Legend
const leg = document.getElementById('legend');
PHASES.forEach(ph => {
  const l = document.createElement('div');
  l.className = 'leg';
  l.innerHTML = `<div class="leg-sq" style="background:${ph.color}"></div><span>${ph.label.split('—')[1].trim()}</span>`;
  leg.appendChild(l);
});
</script>
</body>
</html>
